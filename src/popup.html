<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Review Bell</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header>
      <div class="brand">
        <img src="../icons/icon-32.png" alt="" width="18" height="18">
        <span class="brand-name">Review Bell</span>

      <button id="settings" class="icon-btn" title="Settings" type="button">⚙</button>

      <button id="refresh" type="button">Check now</button>
      <span id="last-checked"></span>
    </footer>
    <script type="module" src="popup.js"></script>
  </body>
</html>
