<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Review Bell Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Review Bell</h1>

      <section id="token-section">
        <label for="token">GitHub token</label>
        <input id="token" type="password" autocomplete="off" placeholder="github_pat_...">
        <p class="hint">Need a token? <a href="https://github.com/settings/tokens/new?scopes=repo&description=Review+Bell" target="_blank" rel="noreferrer">Create a classic PAT</a> on GitHub with the <code>repo</code> scope.</p>
        <button id="load-repos" type="button">Load repositories</button>
      </section>

      <section id="repo-section" hidden>
        <label for="search">Repositories</label>
        <input id="search" type="search" placeholder="Search…">
        <ul id="repo-list"></ul>
      </section>

      <button id="save" type="button">Save</button>
      <p id="status" role="status"></p>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
